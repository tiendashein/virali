<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  height: 100%;
}

.container {
  position: relative;
  width: 100%;
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

video {
  height: 100%;
  max-width: 100%;
  background: #000;
}

/* BOTÓN PRO */
#playBtn {
  position: absolute;
  padding: 14px 28px;
  background: linear-gradient(135deg, #ff0000, #ff3d3d);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  z-index: 10;
  box-shadow: 0 8px 25px rgba(255, 0, 0, 0.5);
  backdrop-filter: blur(6px);
  transition: all 0.25s ease;
}

#playBtn:hover {
  transform: scale(1.06);
  box-shadow: 0 12px 30px rgba(255, 0, 0, 0.7);
}

#playBtn:active {
  transform: scale(0.97);
}
</style>
</head>

<body>

<div class="container">
  <video id="video" controls playsinline>
    <source src="https://vidcool2.org/videos/w1.mp4" type="video/mp4">
  </video>

  <button id="playBtn">▶ VER VIDEO</button>
</div>

<script>
const playBtn = document.getElementById('playBtn');
const video = document.getElementById('video');

let firstAd = false;
let screenClicks = 0; // contador de clicks en pantalla

/* CLICK BOTÓN */
playBtn.addEventListener('click', () => {

  if (!firstAd) {
    firstAd = true;

    window.open(
      'https://inchtennis.com/hg3ncn2taf?key=b6407d0c4cb891aa9c6276ef8d16947b',
      '_blank'
    );
  }

  playBtn.style.display = 'none';
  video.play();
});

/* CLICK EN PANTALLA (MÁXIMO 2 ANUNCIOS) */
document.addEventListener('click', (e) => {

  if (e.target.id === 'playBtn') return;

  if (screenClicks < 2) {
    screenClicks++;

    window.open(
      'https://inchtennis.com/hg3ncn2taf?key=b6407d0c4cb891aa9c6276ef8d16947b',
      '_blank'
    );
  }

});
</script>

</body>
</html>
