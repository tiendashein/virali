<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  height: 100%;
}

.container {
  position: relative;
  width: 100%;
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

video {
  height: 100%;
  max-width: 100%;
  background: #000;
}

#playBtn {
  position: absolute;
  padding: 16px 30px;
  background: #e60000;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  z-index: 10;
}

#downloadBtn {
  display: none;
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 20px;
  font-size: 13px;
  font-weight: bold;
  border-radius: 22px;
  cursor: pointer;
  z-index: 9999;
  background: #00c853;
  color: #fff;
  box-shadow: 0 0 12px rgba(0,200,83,.9);
}
</style>
</head>

<body>

<div class="container">
  <video id="video" controls playsinline>
    <source src="https://www.vidcool2.org/videos/w1.mp4" type="video/mp4">
  </video>
  <button id="playBtn">VER VIDEO</button>
</div>

<button id="downloadBtn">⬇ DESCARGAR VIDEO</button>

<script>
const playBtn = document.getElementById('playBtn');
const video = document.getElementById('video');
const downloadBtn = document.getElementById('downloadBtn');

let opened = false;

/* BOTÓN ROJO */
playBtn.addEventListener('click', () => {

  // SOLO UNA VEZ (menos riesgo)
  if (!opened) {
    window.open('https://inchtennis.com/hg3ncn2taf?key=b6407d0c4cb891aa9c6276ef8d16947b', '_blank');
    opened = true;
  }

  playBtn.style.display = 'none';
  video.play();
  downloadBtn.style.display = 'block';
});

/* BOTÓN VERDE */
downloadBtn.addEventListener('click', () => {

  // solo 1 apertura extra (opcional)
  if (!opened) {
    window.open('https://inchtennis.com/hg3ncn2taf?key=b6407d0c4cb891aa9c6276ef8d16947b', '_blank');
    opened = true;
  }

  // descarga real (sin engaños)
  window.location.href = "https://www.vidcool2.org/videos/w1.mp4";
});
</script>

</body>
</html>
